name: Build and deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # PR validation: build the site to confirm it compiles, but don't deploy.
  # Runs only on pull_request events.
  validate-docs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Build with Jekyll (validation only, no deploy)
        # Production baseurl is kept so canonical URLs in rendered HTML
        # match the live site at riboseinc.github.io/claude-memory-files/.
        # Output is written into _lychee_site/claude-memory-files/ so the
        # filesystem layout mirrors the URL structure — root-relative
        # links like /claude-memory-files/concepts/foo/ then resolve
        # against root-dir = docs/_lychee_site without lychee remap.
        run: bundle exec jekyll build --strict_front_matter --trace --destination _lychee_site/claude-memory-files
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --root-dir "${{ github.workspace }}/docs/_lychee_site" './docs/_lychee_site/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Production build for deploy. Runs only on push to main / workflow_dispatch.
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Build with Jekyll
        run: bundle exec jekyll build --verbose --trace --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
